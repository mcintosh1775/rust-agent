name: ci
on:
  workflow_dispatch:
    inputs:
      reason:
        description: Optional reason for running CI
        required: false
        type: string
      run_all:
        description: Run all CI jobs
        required: false
        default: false
        type: boolean
      run_portability:
        description: Run portability matrix gate
        required: false
        default: false
        type: boolean
      run_build:
        description: Run full build/release-gate/coverage job
        required: false
        default: false
        type: boolean
      run_solo_lite_signoff:
        description: Run solo-lite stack signoff job
        required: false
        default: false
        type: boolean
      run_enterprise_whitenoise_smoke:
        description: Run enterprise White Noise container smoke job
        required: false
        default: false
        type: boolean
jobs:
  portability:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_all == 'true' || github.event.inputs.run_portability == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: make m10-matrix-gate

  build:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_all == 'true' || github.event.inputs.run_build == 'true') }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentdb_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUN_DB_TESTS: "1"
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentdb_test
      COVERAGE_MIN_LINES: "70"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Detect dependency-audit network availability
        id: cargo_audit_network
        run: |
          if curl -fsS --max-time 10 https://index.crates.io/config.json >/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "[ci] Skipping cargo audit: crates.io index unavailable."
          fi
      - name: Install cargo-audit
        if: steps.cargo_audit_network.outputs.available == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo-audit dependency check
        if: steps.cargo_audit_network.outputs.available == 'true'
        run: cargo audit
      - run: cargo fmt --check
      - run: make verify-workspace-versions
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: RELEASE_GATE_SKIP_SOAK=0 make release-gate
      - run: make coverage-db

  solo_lite_signoff:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_all == 'true' || github.event.inputs.run_solo_lite_signoff == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Container Runtime Info
        run: make container-info
      - name: Start solo-lite stack
        run: make stack-lite-up-build
      - name: Wait for solo-lite API
        run: |
          for _ in $(seq 1 90); do
            status_code="$(curl -s -o /tmp/solo-lite-ready.out -w '%{http_code}' \
              -H 'x-tenant-id: single' \
              -H 'x-user-role: owner' \
              'http://localhost:18080/v1/ops/summary?window_secs=3600' || true)"
            if [ "$status_code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "solo-lite API did not become ready at http://localhost:18080"
          cat /tmp/solo-lite-ready.out || true
          exit 1
      - name: Run solo-lite signoff
        env:
          STACK_LITE_SIGNOFF_ITERATIONS: "20"
          STACK_LITE_SIGNOFF_INTERVAL_SECS: "2"
          STACK_LITE_SIGNOFF_TIMEOUT_SECS: "10"
          STACK_LITE_SIGNOFF_ROLES: "owner,operator"
        run: make stack-lite-signoff
      - name: Run solo-lite LLM channel parity smoke
        env:
          LLM_CHANNEL_PARITY_SMOKE_LITE_ARGS: "--start-stack --ready-timeout-secs 180 --run-timeout-secs 120"
        run: make llm-channel-parity-smoke-lite
      - name: Run solo-lite LLM channel drift check
        env:
          LLM_CHANNEL_DRIFT_CHECK_LITE_ARGS: "--window-secs 10800 --min-observations 3 --max-denied-rate-pct 40"
        run: make llm-channel-drift-check-lite
      - name: Teardown solo-lite stack
        if: always()
        run: make stack-lite-down

  enterprise_whitenoise_smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.run_all == 'true' || github.event.inputs.run_enterprise_whitenoise_smoke == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Container Runtime Info
        run: make container-info
      - name: Run enterprise White Noise smoke (mock relay)
        env:
          WHITENOISE_ENTERPRISE_SMOKE_ARGS: "--spawn-mock-relay --build --ready-timeout-secs 180"
        run: make whitenoise-enterprise-smoke
      - name: Run enterprise LLM channel parity smoke
        env:
          LLM_CHANNEL_PARITY_SMOKE_ENTERPRISE_ARGS: "--start-stack --ready-timeout-secs 180 --run-timeout-secs 120"
        run: make llm-channel-parity-smoke-enterprise
      - name: Run enterprise LLM channel drift check
        env:
          LLM_CHANNEL_DRIFT_CHECK_ENTERPRISE_ARGS: "--window-secs 10800 --min-observations 3 --max-denied-rate-pct 40"
        run: make llm-channel-drift-check-enterprise
      - name: Teardown stack
        if: always()
        run: make stack-down
