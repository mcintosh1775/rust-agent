name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentdb_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUN_DB_TESTS: "1"
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentdb_test
      COVERAGE_MIN_LINES: "70"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: make runbook-validate
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: make verify
      - run: cargo run -p agntctl -- ops soak-gate --summary-json agntctl/fixtures/ops_summary_ok.json --max-queued-runs 10 --max-failed-runs-window 3 --max-dead-letter-events-window 0 --max-p95-run-duration-ms 2000 --max-avg-run-duration-ms 1000 --require-duration-metrics
      - run: make coverage-db
