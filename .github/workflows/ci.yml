name: ci
on: [push, pull_request]
jobs:
  portability:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: make m10-matrix-gate

  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentdb_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUN_DB_TESTS: "1"
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentdb_test
      COVERAGE_MIN_LINES: "70"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: RELEASE_GATE_SKIP_SOAK=0 make release-gate
      - run: make coverage-db

  solo_lite_signoff:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Container Runtime Info
        run: make container-info
      - name: Start solo-lite stack
        run: make stack-lite-up-build
      - name: Wait for solo-lite API
        run: |
          for _ in $(seq 1 90); do
            status_code="$(curl -s -o /tmp/solo-lite-ready.out -w '%{http_code}' \
              -H 'x-tenant-id: single' \
              -H 'x-user-role: owner' \
              'http://localhost:18080/v1/ops/summary?window_secs=3600' || true)"
            if [ "$status_code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "solo-lite API did not become ready at http://localhost:18080"
          cat /tmp/solo-lite-ready.out || true
          exit 1
      - name: Run solo-lite signoff
        env:
          STACK_LITE_SIGNOFF_ITERATIONS: "20"
          STACK_LITE_SIGNOFF_INTERVAL_SECS: "2"
          STACK_LITE_SIGNOFF_TIMEOUT_SECS: "10"
          STACK_LITE_SIGNOFF_ROLES: "owner,operator"
        run: make stack-lite-signoff
      - name: Teardown solo-lite stack
        if: always()
        run: make stack-lite-down
