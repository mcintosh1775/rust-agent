name: release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to publish from (e.g. v0.1.90)
        required: true

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    env:
      PLATFORM_TAG: linux-x86_64
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
      SAFE_TAG_NAME: ${{ replace(github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name, '/', '-') }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and package release binaries
        id: release_assets
        run: |
          set -euo pipefail

          bash scripts/ops/package_release_assets.sh "${TAG_NAME}" "${PLATFORM_TAG}" "dist/release"
          deb_output="$(bash scripts/ops/package_release_deb.sh "${TAG_NAME}" "${PLATFORM_TAG}" "dist/release")"
          if ! echo "${deb_output}" | grep -q '^DEB_FILE='; then
            echo "package script did not emit DEB_FILE" >&2
            exit 1
          fi
          release_dir="dist/release/${TAG_NAME}"
          deb_path="$(printf '%s\n' "${deb_output}" | grep '^DEB_FILE=' | tail -n 1 | cut -d= -f2-)"
          if [ -z "${deb_path}" ] || [ ! -f "${deb_path}" ]; then
            echo "missing release deb file: ${deb_path}" >&2
            exit 1
          fi
          echo "deb_file=${deb_path}" >> "${GITHUB_OUTPUT}"

      - name: Generate GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: |
            dist/release/${{ env.TAG_NAME }}/secureagnt-api-${{ env.PLATFORM_TAG }}-${{ env.SAFE_TAG_NAME }}.tar.gz
            dist/release/${{ env.TAG_NAME }}/secureagntd-${{ env.PLATFORM_TAG }}-${{ env.SAFE_TAG_NAME }}.tar.gz
            dist/release/${{ env.TAG_NAME }}/agntctl-${{ env.PLATFORM_TAG }}-${{ env.SAFE_TAG_NAME }}.tar.gz
            dist/release/${{ env.TAG_NAME }}/secureagnt-api-${{ env.PLATFORM_TAG }}-${{ env.SAFE_TAG_NAME }}
            dist/release/${{ env.TAG_NAME }}/secureagntd-${{ env.PLATFORM_TAG }}-${{ env.SAFE_TAG_NAME }}
            dist/release/${{ env.TAG_NAME }}/agntctl-${{ env.PLATFORM_TAG }}-${{ env.SAFE_TAG_NAME }}
            ${{ steps.release_assets.outputs.deb_file }}
            dist/release/${{ env.TAG_NAME }}/release-manifest.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
