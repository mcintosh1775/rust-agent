services:
  postgres:
    profiles: ["db", "stack"]
    image: docker.io/library/postgres:18
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: agentdb
    ports:
      - "5432:5432"
    volumes:
      - agentdb-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["stack"]
    build:
      context: ../..
      dockerfile: infra/containers/Dockerfile.api
      args:
        CARGO_BUILD_JOBS: ${SECUREAGNT_CARGO_BUILD_JOBS:-2}
    image: secureagnt/api:dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agentdb
      API_BIND: 0.0.0.0:8080
      API_RUN_MIGRATIONS: "1"
      API_TRUSTED_PROXY_AUTH_ENABLED: ${API_TRUSTED_PROXY_AUTH_ENABLED:-0}
      API_TRUSTED_PROXY_SHARED_SECRET: ${API_TRUSTED_PROXY_SHARED_SECRET:-}
      API_TRUSTED_PROXY_SHARED_SECRET_REF: ${API_TRUSTED_PROXY_SHARED_SECRET_REF:-}
      API_AGENT_BOOTSTRAP_ENABLED: ${API_AGENT_BOOTSTRAP_ENABLED:-1}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  worker:
    profiles: ["stack"]
    build:
      context: ../..
      dockerfile: infra/containers/Dockerfile.worker
      args:
        CARGO_BUILD_JOBS: ${SECUREAGNT_CARGO_BUILD_JOBS:-2}
    image: secureagnt/worker:dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agentdb
      WORKER_ID: worker-compose-1
      WORKER_ARTIFACT_ROOT: /var/lib/secureagnt/artifacts
      WORKER_SKILL_COMMAND: python3
      WORKER_SKILL_SCRIPT: /opt/secureagnt/skills/python/summarize_transcript/main.py
      LLM_MODE: ${LLM_MODE:-local_first}
      LLM_MAX_INPUT_BYTES: ${LLM_MAX_INPUT_BYTES:-262144}
      LLM_MAX_PROMPT_BYTES: ${LLM_MAX_PROMPT_BYTES:-32000}
      LLM_MAX_OUTPUT_BYTES: ${LLM_MAX_OUTPUT_BYTES:-64000}
      LLM_LARGE_INPUT_THRESHOLD_BYTES: ${LLM_LARGE_INPUT_THRESHOLD_BYTES:-12000}
      LLM_LARGE_INPUT_POLICY: ${LLM_LARGE_INPUT_POLICY:-summarize_first}
      LLM_LARGE_INPUT_SUMMARY_TARGET_BYTES: ${LLM_LARGE_INPUT_SUMMARY_TARGET_BYTES:-8000}
      LLM_CONTEXT_RETRIEVAL_TOP_K: ${LLM_CONTEXT_RETRIEVAL_TOP_K:-6}
      LLM_CONTEXT_RETRIEVAL_MAX_BYTES: ${LLM_CONTEXT_RETRIEVAL_MAX_BYTES:-32000}
      LLM_CONTEXT_RETRIEVAL_CHUNK_BYTES: ${LLM_CONTEXT_RETRIEVAL_CHUNK_BYTES:-2048}
      LLM_ADMISSION_ENABLED: ${LLM_ADMISSION_ENABLED:-1}
      LLM_ADMISSION_INTERACTIVE_MAX_INFLIGHT: ${LLM_ADMISSION_INTERACTIVE_MAX_INFLIGHT:-8}
      LLM_ADMISSION_BATCH_MAX_INFLIGHT: ${LLM_ADMISSION_BATCH_MAX_INFLIGHT:-2}
      LLM_CACHE_ENABLED: ${LLM_CACHE_ENABLED:-0}
      LLM_CACHE_TTL_SECS: ${LLM_CACHE_TTL_SECS:-300}
      LLM_CACHE_MAX_ENTRIES: ${LLM_CACHE_MAX_ENTRIES:-1024}
      LLM_DISTRIBUTED_ENABLED: ${LLM_DISTRIBUTED_ENABLED:-0}
      LLM_DISTRIBUTED_FAIL_OPEN: ${LLM_DISTRIBUTED_FAIL_OPEN:-1}
      LLM_DISTRIBUTED_OWNER: ${LLM_DISTRIBUTED_OWNER:-}
      LLM_DISTRIBUTED_ADMISSION_ENABLED: ${LLM_DISTRIBUTED_ADMISSION_ENABLED:-0}
      LLM_DISTRIBUTED_ADMISSION_LEASE_MS: ${LLM_DISTRIBUTED_ADMISSION_LEASE_MS:-30000}
      LLM_DISTRIBUTED_CACHE_ENABLED: ${LLM_DISTRIBUTED_CACHE_ENABLED:-0}
      LLM_DISTRIBUTED_CACHE_NAMESPACE_MAX_ENTRIES: ${LLM_DISTRIBUTED_CACHE_NAMESPACE_MAX_ENTRIES:-4096}
      LLM_VERIFIER_ENABLED: ${LLM_VERIFIER_ENABLED:-0}
      LLM_VERIFIER_MODE: ${LLM_VERIFIER_MODE:-heuristic}
      LLM_VERIFIER_MIN_SCORE_PCT: ${LLM_VERIFIER_MIN_SCORE_PCT:-65}
      LLM_VERIFIER_ESCALATE_REMOTE: ${LLM_VERIFIER_ESCALATE_REMOTE:-1}
      LLM_VERIFIER_MIN_RESPONSE_CHARS: ${LLM_VERIFIER_MIN_RESPONSE_CHARS:-48}
      LLM_VERIFIER_JUDGE_BASE_URL: ${LLM_VERIFIER_JUDGE_BASE_URL:-}
      LLM_VERIFIER_JUDGE_MODEL: ${LLM_VERIFIER_JUDGE_MODEL:-}
      LLM_VERIFIER_JUDGE_API_KEY: ${LLM_VERIFIER_JUDGE_API_KEY:-}
      LLM_VERIFIER_JUDGE_API_KEY_REF: ${LLM_VERIFIER_JUDGE_API_KEY_REF:-}
      LLM_VERIFIER_JUDGE_TIMEOUT_MS: ${LLM_VERIFIER_JUDGE_TIMEOUT_MS:-4000}
      LLM_VERIFIER_JUDGE_FAIL_OPEN: ${LLM_VERIFIER_JUDGE_FAIL_OPEN:-1}
      LLM_SLO_INTERACTIVE_MAX_LATENCY_MS: ${LLM_SLO_INTERACTIVE_MAX_LATENCY_MS:-}
      LLM_SLO_BATCH_MAX_LATENCY_MS: ${LLM_SLO_BATCH_MAX_LATENCY_MS:-}
      LLM_SLO_ALERT_THRESHOLD_PCT: ${LLM_SLO_ALERT_THRESHOLD_PCT:-}
      LLM_SLO_BREACH_ESCALATE_REMOTE: ${LLM_SLO_BREACH_ESCALATE_REMOTE:-0}
      LLM_LOCAL_BASE_URL: ${LLM_LOCAL_BASE_URL:-}
      LLM_LOCAL_MODEL: ${LLM_LOCAL_MODEL:-qwen2.5:7b-instruct}
      LLM_LOCAL_API_KEY: ${LLM_LOCAL_API_KEY:-}
      LLM_LOCAL_API_KEY_REF: ${LLM_LOCAL_API_KEY_REF:-}
      LLM_LOCAL_SMALL_BASE_URL: ${LLM_LOCAL_SMALL_BASE_URL:-}
      LLM_LOCAL_SMALL_MODEL: ${LLM_LOCAL_SMALL_MODEL:-}
      LLM_LOCAL_SMALL_API_KEY: ${LLM_LOCAL_SMALL_API_KEY:-}
      LLM_LOCAL_SMALL_API_KEY_REF: ${LLM_LOCAL_SMALL_API_KEY_REF:-}
      LLM_LOCAL_INTERACTIVE_TIER: ${LLM_LOCAL_INTERACTIVE_TIER:-workhorse}
      LLM_LOCAL_BATCH_TIER: ${LLM_LOCAL_BATCH_TIER:-workhorse}
      LLM_REMOTE_BASE_URL: ${LLM_REMOTE_BASE_URL:-}
      LLM_REMOTE_MODEL: ${LLM_REMOTE_MODEL:-}
      LLM_REMOTE_API_KEY: ${LLM_REMOTE_API_KEY:-}
      LLM_REMOTE_API_KEY_REF: ${LLM_REMOTE_API_KEY_REF:-}
      LLM_REMOTE_EGRESS_ENABLED: ${LLM_REMOTE_EGRESS_ENABLED:-0}
      LLM_REMOTE_EGRESS_CLASS: ${LLM_REMOTE_EGRESS_CLASS:-cloud_allowed}
      LLM_REMOTE_HOST_ALLOWLIST: ${LLM_REMOTE_HOST_ALLOWLIST:-}
      LLM_REMOTE_TOKEN_BUDGET_PER_RUN: ${LLM_REMOTE_TOKEN_BUDGET_PER_RUN:-}
      LLM_REMOTE_TOKEN_BUDGET_PER_TENANT: ${LLM_REMOTE_TOKEN_BUDGET_PER_TENANT:-}
      LLM_REMOTE_TOKEN_BUDGET_PER_AGENT: ${LLM_REMOTE_TOKEN_BUDGET_PER_AGENT:-}
      LLM_REMOTE_TOKEN_BUDGET_PER_MODEL: ${LLM_REMOTE_TOKEN_BUDGET_PER_MODEL:-}
      LLM_REMOTE_TOKEN_BUDGET_WINDOW_SECS: ${LLM_REMOTE_TOKEN_BUDGET_WINDOW_SECS:-86400}
      LLM_REMOTE_TOKEN_BUDGET_SOFT_ALERT_THRESHOLD_PCT: ${LLM_REMOTE_TOKEN_BUDGET_SOFT_ALERT_THRESHOLD_PCT:-}
      LLM_REMOTE_COST_PER_1K_TOKENS_USD: ${LLM_REMOTE_COST_PER_1K_TOKENS_USD:-0.0}
      WORKER_LOCAL_EXEC_ENABLED: ${WORKER_LOCAL_EXEC_ENABLED:-0}
      WORKER_COMPLIANCE_SIEM_DELIVERY_ENABLED: ${WORKER_COMPLIANCE_SIEM_DELIVERY_ENABLED:-0}
      WORKER_COMPLIANCE_SIEM_HTTP_ENABLED: ${WORKER_COMPLIANCE_SIEM_HTTP_ENABLED:-0}
      WORKER_COMPLIANCE_SIEM_HTTP_AUTH_TOKEN: ${WORKER_COMPLIANCE_SIEM_HTTP_AUTH_TOKEN:-}
      WORKER_COMPLIANCE_SIEM_HTTP_AUTH_TOKEN_REF: ${WORKER_COMPLIANCE_SIEM_HTTP_AUTH_TOKEN_REF:-}
      PAYMENT_NWC_ENABLED: ${PAYMENT_NWC_ENABLED:-0}
      PAYMENT_NWC_URI: ${PAYMENT_NWC_URI:-}
      PAYMENT_NWC_URI_REF: ${PAYMENT_NWC_URI_REF:-}
      PAYMENT_APPROVAL_THRESHOLD_MSAT: ${PAYMENT_APPROVAL_THRESHOLD_MSAT:-}
      PAYMENT_CASHU_ENABLED: ${PAYMENT_CASHU_ENABLED:-0}
      WORKER_AGENT_CONTEXT_ENABLED: ${WORKER_AGENT_CONTEXT_ENABLED:-0}
      WORKER_AGENT_CONTEXT_REQUIRED: ${WORKER_AGENT_CONTEXT_REQUIRED:-0}
      WORKER_AGENT_CONTEXT_ROOT: ${WORKER_AGENT_CONTEXT_ROOT:-/var/lib/secureagnt/agent-context}
      WORKER_AGENT_CONTEXT_REQUIRED_FILES: ${WORKER_AGENT_CONTEXT_REQUIRED_FILES:-}
      WORKER_AGENT_CONTEXT_MAX_FILE_BYTES: ${WORKER_AGENT_CONTEXT_MAX_FILE_BYTES:-65536}
      WORKER_AGENT_CONTEXT_MAX_TOTAL_BYTES: ${WORKER_AGENT_CONTEXT_MAX_TOTAL_BYTES:-262144}
      WORKER_AGENT_CONTEXT_MAX_DYNAMIC_FILES_PER_DIR: ${WORKER_AGENT_CONTEXT_MAX_DYNAMIC_FILES_PER_DIR:-8}
    depends_on:
      - postgres
      - api
    volumes:
      - secureagnt-artifacts:/var/lib/secureagnt/artifacts
      - ../../agent_context:/var/lib/secureagnt/agent-context:ro
    restart: unless-stopped

  api-lite:
    profiles: ["solo-lite"]
    build:
      context: ../..
      dockerfile: infra/containers/Dockerfile.api
      args:
        CARGO_BUILD_JOBS: ${SECUREAGNT_CARGO_BUILD_JOBS:-2}
    image: secureagnt/api:dev
    environment:
      DATABASE_URL: ${SOLO_LITE_DATABASE_URL:-sqlite:///var/lib/secureagnt/solo-lite/secureagnt.sqlite3}
      API_BIND: 0.0.0.0:8080
      API_RUN_MIGRATIONS: "1"
      API_TRUSTED_PROXY_AUTH_ENABLED: ${API_TRUSTED_PROXY_AUTH_ENABLED:-0}
      API_TRUSTED_PROXY_SHARED_SECRET: ${API_TRUSTED_PROXY_SHARED_SECRET:-}
      API_TRUSTED_PROXY_SHARED_SECRET_REF: ${API_TRUSTED_PROXY_SHARED_SECRET_REF:-}
      API_AGENT_BOOTSTRAP_ENABLED: ${API_AGENT_BOOTSTRAP_ENABLED:-1}
    ports:
      - "${SOLO_LITE_API_PORT:-18080}:8080"
    volumes:
      - secureagnt-solo-lite-data:/var/lib/secureagnt/solo-lite
    restart: unless-stopped

  worker-lite:
    profiles: ["solo-lite"]
    build:
      context: ../..
      dockerfile: infra/containers/Dockerfile.worker
      args:
        CARGO_BUILD_JOBS: ${SECUREAGNT_CARGO_BUILD_JOBS:-2}
    image: secureagnt/worker:dev
    environment:
      DATABASE_URL: sqlite:///var/lib/secureagnt/solo-lite/secureagnt.sqlite3
      WORKER_ID: worker-solo-lite-1
      WORKER_ARTIFACT_ROOT: /var/lib/secureagnt/artifacts
      WORKER_SKILL_COMMAND: python3
      WORKER_SKILL_SCRIPT: /opt/secureagnt/skills/python/summarize_transcript/main.py
      WORKER_TRIGGER_SCHEDULER_ENABLED: "0"
      WORKER_MEMORY_COMPACTION_ENABLED: "0"
      WORKER_COMPLIANCE_SIEM_DELIVERY_ENABLED: "0"
      WORKER_COMPLIANCE_SIEM_HTTP_ENABLED: "0"
      PAYMENT_NWC_ENABLED: "0"
      PAYMENT_CASHU_ENABLED: "0"
      WORKER_LOCAL_EXEC_ENABLED: "0"
      WORKER_AGENT_CONTEXT_ENABLED: "0"
      WORKER_AGENT_CONTEXT_REQUIRED: "0"
      WORKER_AGENT_CONTEXT_ROOT: /var/lib/secureagnt/agent-context
      LLM_MODE: local_first
      LLM_MAX_INPUT_BYTES: "262144"
      LLM_MAX_PROMPT_BYTES: "32000"
      LLM_MAX_OUTPUT_BYTES: "64000"
      LLM_LOCAL_BASE_URL: ""
      LLM_LOCAL_MODEL: qwen2.5:7b-instruct
      LLM_LOCAL_API_KEY: ""
      LLM_LOCAL_API_KEY_REF: ""
      LLM_REMOTE_EGRESS_ENABLED: "0"
      LLM_REMOTE_EGRESS_CLASS: cloud_allowed
    depends_on:
      - api-lite
    volumes:
      - secureagnt-artifacts:/var/lib/secureagnt/artifacts
      - secureagnt-solo-lite-data:/var/lib/secureagnt/solo-lite
      - ../../agent_context:/var/lib/secureagnt/agent-context:ro
    restart: unless-stopped
volumes:
  agentdb-pg18-data:
  secureagnt-solo-lite-data:
  secureagnt-artifacts:
